{% extends "myapp/base.html" %}

{% block body %}
    <h1 class="text-2xl px-32 pt-10">Today's deals</h1>
    <div class="px-32">
        <hr class="boder-t border-gray-300 my-5">
    </div>

    <div class="grid grid-cols-4 px-32 gap-6" >
        {% for product in products %}
        <div class="rounded-lg shadow-lg p-4">
            <img 
            class="rounded-md mb-4 w-80 h-80 mx-auto" 
            src="{{product.image.url}}" 
            alt="" 
            />
            <!-- <a class="text-lg font-semibold" href="{% url 'detail' product.slug %}">{{product.name}}</a> -->
            <a class="text-lg font-semibold" href="{{product.get_absolute_url}}">{{product.name}}</a>
            <p class="text-gray-600">{{product.description}}</p>
            <p class="text-green-500 font-bold mt-2 text-lg">${{product.price}}</p>
        </div>



        {% endfor %}
    </div>

{% endblock body %}
